name: Dependency Security Audit

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  push:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Run npm audit
      id: npm-audit
      run: |
        npm audit --json > npm-audit.json 2>&1
        if [ $? -eq 0 ]; then
          echo "npm-audit-result=success" >> $GITHUB_OUTPUT
        else
          echo "npm-audit-result=failure" >> $GITHUB_OUTPUT
        fi

    - name: Run outdated check
      id: npm-outdated
      run: |
        npm outdated --json > npm-outdated.json 2>&1
        if [ $? -eq 0 ]; then
          echo "npm-outdated-result=success" >> $GITHUB_OUTPUT
        else
          echo "npm-outdated-result=failure" >> $GITHUB_OUTPUT
        fi

    - name: Check licenses
      id: license-check
      run: |
        npx license-checker --json > licenses.json
        python -c "
          import json
          import sys

          with open('licenses.json') as f:
            licenses = json.load(f)

          # Check for non-MIT licenses
          non_compatible = []
          for package, info in licenses.items():
            license_type = info.get('license', '').lower()
            if license_type not in ['mit', 'apache-2.0', 'bsd-3-clause', 'public domain']:
              non_compatible.append({
                'package': package,
                'license': license_type
              })

          if non_compatible:
            print('Non-compatible licenses found:')
            for pkg in non_compatible:
              print(f'  - {pkg[\"package\"]}: {pkg[\"license\"]}')
            sys.exit(1)
          else:
            print('All licenses are compatible (MIT/Apache/BSD)')
        "

    - name: Generate audit report
      if: always()
      run: |
        cat > dependency-audit-report.md << 'EOF'
        # 📊 Dependency Audit Report - $(date '+%Y-%m-%d')

        ## Security Audit Results

        ### npm Audit
        ${{ steps.npm-audit.outputs.npm-audit-result == 'success' && '✅ Passed' || '❌ Failed' }}

        ### Outdated Packages
        ${{ steps.npm-outdated.outputs.npm-outdated-result == 'success' && '✅ All packages up-to-date' || '❌ Outdated packages found' }}

        ### License Compliance
        ✅ All licenses compatible (MIT/Apache/BSD)

        ## Summary

        This automated audit checks for:
        - Security vulnerabilities
        - Outdated dependencies
        - License compliance

        Next steps:
        - Review findings below
        - Address critical security issues
        - Update outdated packages
        - Monitor for new vulnerabilities

        ---
        *Generated by GitHub Actions*
        EOF

    - name: Upload audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-audit-results
        path: |
          npm-audit.json
          npm-outdated.json
          licenses.json
          dependency-audit-report.md
        retention-days: 30

    - name: Create issue for critical vulnerabilities
      if: steps.npm-audit.outputs.npm-audit-result == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = 'npm-audit.json';

          if (fs.existsSync(path)) {
            const audit = JSON.parse(fs.readFileSync(path, 'utf8'));
            const critical = audit.vulnerabilities?.critical || 0;
            const high = audit.vulnerabilities?.high || 0;

            if (critical > 0 || high > 0) {
              const body = `🚨 **Security Alert**

              Critical or high-severity vulnerabilities detected in dependencies.

              **Vulnerabilities:**
              - Critical: ${critical}
              - High: ${high}

              **Recommendation:**
              Review the [dependency-audit-report.md](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

              [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🚨 ${critical + high} security vulnerabilities found`,
                body: body,
                labels: ['security', 'dependencies', 'critical'],
                assignees: ['${{ github.actor }}']
              });
            }
          }

    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          let comment = '## 📦 Dependency Audit Results\n\n';

          // Add security status
          comment += '### Security Audit\n';
          if (fs.existsSync('npm-audit.json')) {
            const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
            const total = audit.vulnerabilities?.total || 0;
            comment += total > 0 ? `❌ Found ${total} vulnerabilities\n` : '✅ No vulnerabilities found\n';
          }

          // Add outdated status
          comment += '\n### Outdated Packages\n';
          if (fs.existsSync('npm-outdated.json')) {
            const outdated = JSON.parse(fs.readFileSync('npm-outdated.json', 'utf8'));
            const count = Object.keys(outdated).length;
            comment += count > 0 ? `⚠️ ${count} packages outdated\n` : '✅ All packages up-to-date\n';
          }

          // Add license status
          comment += '\n### License Compliance\n✅ All licenses compatible\n';

          // Add recommendations
          comment += '\n### Recommendations\n';
          if (fs.existsSync('npm-audit.json')) {
            const audit = JSON.parse(fs.readFileSync('npm-audit.json', 'utf8'));
            if (audit.vulnerabilities?.total > 0) {
              comment += '- Run `npm audit fix` to address security issues\n';
            }
          }

          if (fs.existsSync('npm-outdated.json')) {
            const outdated = JSON.parse(fs.readFileSync('npm-outdated.json', 'utf8'));
            if (Object.keys(outdated).length > 0) {
              comment += '- Update outdated packages with `npm outdated` and `npm update`\n';
            }
          }

          // Post comment
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });
